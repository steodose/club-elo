name: update-matches

on:
  schedule:
    - cron: "00 23 * * SUN,MON,THU"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-matches
  cancel-in-progress: true

jobs:
  run-matches-script:
    name: Run R script and update matches csv
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.2.3"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libfontconfig1-dev

      # Installs + caches R packages automatically
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # keep this list minimal
          packages: |
            any::tidyverse
            any::lubridate
            any::readr
          cache-version: 1

      - name: Run matches script
        run: Rscript update_matches.R

      - name: Commit results
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # only stage the artifact(s) you expect to change
          git add matches_all_leagues.csv

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Automated run to update matches"

          # avoid non-fast-forward failures if remote moved
          git pull --rebase
          git push